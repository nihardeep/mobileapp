<!DOCTYPE html>
<html>
<head>
<style>
  body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #eee; }
  .wrapper { position: relative; width: 300px; height: 200px; perspective: 1500px; }
  .card { 
    width: 100%; height: 100%; background: #0f172a; color: white; 
    transition: all 0.7s; transform-origin: left center; z-index: 2; position: relative;
    display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box;
  }
  .menu { 
    position: absolute; top: 0; right: 0; width: 60%; height: 100%; 
    background: white; border-radius: 16px; opacity: 0; transition: all 0.7s;
    transform: translateX(10%); z-index: 1;
  }
  .wrapper:hover .card {
    /* Test positive 45deg */
    transform: translateX(-55%) rotateY(45deg) scale(0.95);
    box-shadow: 20px 0 40px rgba(0,0,0,0.15);
  }
  .wrapper:hover .menu {
    opacity: 1; transform: translateX(0);
  }
</style>
</head>
<body>
  <div class="wrapper">
    <div class="menu">Menu Items Here</div>
    <div class="card">
      <span style="font-size: 20px;">BALANCE</span>
      <span>View Options -></span>
    </div>
  </div>
</body>
</html>
